<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PELITA - Penerang Literasi Kesehatan</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;900&family=Sen:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* --- RESET DASAR --- */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: #2c1e12; display: flex; justify-content: center; align-items: center;
            min-height: 100vh; font-family: 'Sen', sans-serif; overflow: hidden;
        }

        /* --- KOTAK GAME (RASIO 3:2, RESPONSITF) --- */
        .game-frame {
            position: relative; width: 95vw; max-width: 1080px; aspect-ratio: 3 / 2;
            background-color: #fcf9ee; border: 8px solid #4a2e1b; border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6); overflow: hidden;
        }

        .slide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; }
        #slide1 { display: block; }
        .bg-game-image { width: 100%; height: 100%; object-fit: cover; display: block; }

        /* --- SLIDE 1: TOMBOL MULAI --- */
        .bottom-panel {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 20%; 
            background: linear-gradient(to top, #4a2e1b, #6b442a); border-top: 4px solid #dca658; 
            display: flex; justify-content: center; align-items: center; z-index: 10;
        }
        .btn-mulai {
            width: 85%; height: 75%; background: linear-gradient(135deg, #dca658, #b87c32); 
            color: #ffffff; border: 3px solid #ffffff; font-size: clamp(18px, 4vw, 36px); 
            font-family: 'Poppins', sans-serif; font-weight: 900; letter-spacing: 3px; 
            border-radius: 15px; cursor: pointer; box-shadow: 0 6px 0 #7c5333; transition: 0.1s;
        }
        .btn-mulai:active { transform: translateY(4px); box-shadow: 0 2px 0 #7c5333; }

        /* --- SLIDE 2: TULISAN PAPAN & MENU DESA --- */
        .papan-desa {
            position: absolute; top: 10%; left: 50%; transform: translateX(-50%);
            width: 50%; text-align: center; pointer-events: none; z-index: 5;
        }
        .papan-text {
            font-family: 'Poppins', sans-serif; font-weight: 900; color: #3e2717;
            font-size: clamp(12px, 2.5vw, 28px); line-height: 1.2; text-transform: uppercase;
        }

        .menu-labels-container {
            position: absolute; top: 44.5%; left: 26.5%; width: 47%; height: 5.5%;
            display: flex; justify-content: space-between; align-items: center; z-index: 10;
        }
        .btn-menu {
            width: 32%; height: 100%; background: transparent; color: #ffffff; 
            font-size: clamp(7px, 1.2vw, 14px); font-weight: bold; border: none; cursor: pointer; 
            font-family: 'Poppins', sans-serif; text-align: center;
        }

        /* --- SLIDE INFO (CARA MAIN & RULES) --- */
        .info-layout {
            display: flex; width: 100%; height: 100%; background-color: #f7f2e1;
            position: relative; padding: 30px; align-items: center;
        }
        
        /* Teks di Kiri */
        .text-content {
            width: 50%; height: 100%; display: flex; flex-direction: column; 
            justify-content: center; text-align: left; z-index: 5;
        }
        .info-title { font-family: 'Poppins', sans-serif; font-size: clamp(22px, 3.5vw, 38px); color: #4a2e1b; margin-bottom: 15px; }
        .info-list { font-size: clamp(14px, 2.2vw, 20px); line-height: 1.4; color: #3e2717; list-style: none; margin-bottom: 25px; font-weight: bold; }
        .info-list li { margin-bottom: 12px; position: relative; padding-left: 25px; }
        .info-list li::before { content: '◈'; position: absolute; left: 0; color: #dca658; }

        /* Karakter Raksasa di Kanan */
        .character-box-right {
            position: absolute; right: 2%; bottom: 0; width: 45%; height: 95%;
            display: flex; flex-direction: column; justify-content: flex-end; align-items: center; z-index: 2;
        }

        /* Gelembung Besar di Atas Kepala Karakter */
        .speech-bubble-top {
            background: #ffffff; border: 5px solid #4a2e1b; border-radius: 20px;
            padding: 20px; width: 90%; margin-bottom: -10px; box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            animation: popBubble 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 10;
            position: relative; text-align: left; /* Teks dibaca dari kiri normal */
        }
        /* Buntut Gelembung yang menunjuk ke karakter */
        .speech-bubble-top::after {
            content: ''; position: absolute; bottom: -18px; left: 50%; transform: translateX(-50%);
            border-width: 18px 15px 0 15px; border-style: solid; border-color: #4a2e1b transparent;
        }
        .bubble-text { 
            font-weight: 900; font-size: clamp(14px, 2.2vw, 22px); color: #4a2e1b; line-height: 1.4;
        }

        /* Gambar Karakter Ditebelin */
        .info-portrait-large {
            height: 60%; /* Raksasa! */
            width: auto; object-fit: contain; mix-blend-mode: screen;
            /* Efek bayangan biar karakter kelihatan tebal dan nyata */
            filter: drop-shadow(4px 4px 10px rgba(0,0,0,0.6)) contrast(1.1);
            animation: slideInUp 0.6s ease-out;
        }

        /* Tombol Bawah Kiri */
        .action-area { display: flex; gap: 10px; }
        .btn-action {
            padding: 12px 25px; border-radius: 50px; border: none; cursor: pointer;
            font-family: 'Poppins', sans-serif; font-weight: bold; font-size: clamp(12px, 1.8vw, 16px);
            transition: 0.2s; box-shadow: 0 4px 0 #2c1e12; text-transform: uppercase;
        }
        .btn-back { background: #6b442a; color: #fff; }
        .btn-next { background: #dca658; color: #fff; }
        .btn-action:active { transform: translateY(4px); box-shadow: none; }

        /* --- KEYFRAMES ANIMASI --- */
        @keyframes slideInUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes popBubble { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <audio id="soundKlik" src="slide 1 mulai.wav" preload="auto"></audio>
    <audio id="soundWelcome" src="welcoming.wav" preload="auto"></audio>

    <div class="game-frame">

        <div id="slide1" class="slide">
            <img src="slide 1.png" class="bg-game-image" alt="Splash Screen">
            <div class="bottom-panel">
                <button class="btn-mulai" onclick="navigasi('slide2', 'klik')">MULAI PETUALANGAN</button>
            </div>
        </div>

        <div id="slide2" class="slide">
            <img src="slide 2.png" class="bg-game-image" alt="Menu Utama">
            
            <div class="papan-desa">
                <p class="papan-text">Selamat Datang di<br>Desa Pelita</p>
            </div>

            <div class="menu-labels-container">
                <button class="btn-menu" onclick="bukaInfo('cara')">CARA MAIN</button>
                <button class="btn-menu" onclick="bukaInfo('rules')">RULES</button>
                <button class="btn-menu" onclick="navigasi('start', 'welcome')">MULAI PETUALANGAN</button>
            </div>
        </div>

        <div id="slideInfo" class="slide">
            <div class="info-layout">
                
                <div class="text-content">
                    <h2 id="infoTitle" class="info-title">CARA MAIN</h2>
                    <ul id="infoList" class="info-list"></ul>
                    <div class="action-area">
                        <button class="btn-action btn-back" onclick="navigasi('slide2', 'klik')">KEMBALI</button>
                        <button id="btnLanjutRules" class="btn-action btn-next" onclick="navigasi('start', 'welcome')">MULAI SEKARANG!</button>
                    </div>
                </div>

                <div class="character-box-right">
                    <div class="speech-bubble-top">
                        <p id="bubbleText" class="bubble-text"></p>
                    </div>
                    <img id="charPortrait" src="nakula.png" class="info-portrait-large" alt="Karakter">
                </div>

            </div>
        </div>

    </div>

    <script>
        const audioKlik = document.getElementById('soundKlik');
        const audioWelcome = document.getElementById('soundWelcome');

        // Isi Teks
        const content = {
            cara: {
                title: "🧩 CARA MAIN",
                list: ["Ikuti 12 Misi Kesehatan.", "Pilih satu jawaban terbaik.", "Kumpulkan bintang tiap chapter!"],
                bubbleNakula: "Aku Tabib Nakula! Baca cerita dengan teliti ya agar tidak salah pilih!",
                bubbleSadewa: "Detektif Sadewa di sini! Gunakan logika untuk cari fakta medis!"
            },
            rules: {
                title: "⚖️ ATURAN GAME",
                list: ["Jawaban Benar = +1 Bintang.", "Jawaban Salah = 0 (Ga dikurangi).", "Bisa main di HP dan Laptop."],
                bubbleNakula: "Jangan takut salah! Kita belajar sehat bersama-sama.",
                bubbleSadewa: "Setiap misi punya tantangan unik. Siapkan dirimu!"
            }
        };

        // Fungsi Navigasi
        function navigasi(target, tipeSuara) {
            let audio = (tipeSuara === 'klik') ? audioKlik : audioWelcome;
            audio.currentTime = 0; audio.play().catch(e => console.log("Audio tertahan"));

            if(target === 'start') {
                setTimeout(() => alert("Fitur gameplay lanjutannya belum dibuat sesuai instruksimu."), 500);
                return;
            }

            setTimeout(() => {
                document.querySelectorAll('.slide').forEach(s => s.style.display = 'none');
                document.getElementById(target).style.display = 'block';
            }, 300);
        }

        // Fungsi Buka Halaman Cara Main / Rules
        function bukaInfo(tipe) {
            audioKlik.currentTime = 0; audioKlik.play().catch(e => console.log("Audio tertahan"));

            // Acak Karakter 50:50
            const isNakula = Math.random() < 0.5;
            document.getElementById('charPortrait').src = isNakula ? 'nakula.png' : 'sadewa.png';
            document.getElementById('infoTitle').innerText = content[tipe].title;
            document.getElementById('bubbleText').innerText = isNakula ? content[tipe].bubbleNakula : content[tipe].bubbleSadewa;
            
            const list = document.getElementById('infoList');
            list.innerHTML = "";
            content[tipe].list.forEach(item => {
                let li = document.createElement('li'); li.innerText = item; list.appendChild(li);
            });

            // Tampilkan tombol "Mulai Sekarang" hanya di halaman Rules
            document.getElementById('btnLanjutRules').style.display = (tipe === 'rules') ? 'block' : 'none';

            setTimeout(() => {
                document.querySelectorAll('.slide').forEach(s => s.style.display = 'none');
                document.getElementById('slideInfo').style.display = 'block';
            }, 300);
        }
    </script>
</body>
</html>
