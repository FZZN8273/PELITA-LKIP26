<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PELITA - Penerang Literasi Kesehatan Kita</title>
    <style>
        /* --- RESET & BASE STYLE --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            /* Memastikan klik halus di perangkat Apple/iOS */
            -webkit-tap-highlight-color: transparent; 
        }

        body {
            background-color: #dcd5c1; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* --- CONTAINER UTAMA (RASIO LAYAR GAME 3:2) --- */
        .game-frame {
            position: relative;
            width: 95vw;
            max-width: 900px; 
            aspect-ratio: 3 / 2;
            background-color: #fcf9ee;
            border: 6px solid #4a2e1b; 
            border-radius: 16px;
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.4);
            overflow: hidden;
        }

        /* --- KELAS UNTUK TIAP SLIDE --- */
        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none; 
        }

        #slide1 {
            display: block;
        }

        .bg-game-image {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            display: block;
        }

        /* --- MASKING PANEL BAWAH (Menutupi Ikon & Teks Bawah) --- */
        .bottom-panel {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 18%; /* Ketinggian ini dijamin menutupi area ikon dan teks di gambar */
            background-color: #4a2e1b; /* Warna panel cokelat tua */
            border-top: 3px solid #dca658; /* Garis emas pemisah */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            padding: 10px;
        }

        /* --- TOMBOL RAKSASA RESPONSITF --- */
        .btn-game {
            width: 90%; /* Lebar menutupi panel */
            height: 90%; /* Tinggi menutupi panel */
            background: linear-gradient(135deg, #a66e38, #7c5333);
            color: #fcf9ee;
            border: 2px solid #f0dca8;
            /* Font responsif: Otomatis membesar di Desktop & pas di HP */
            font-size: clamp(18px, 4vw, 32px); 
            font-weight: 900;
            letter-spacing: 2px;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            transition: all 0.2s ease;
            -webkit-appearance: none; /* Mencegah bug tampilan tombol di iOS */
            text-transform: uppercase;
        }

        .btn-game:hover {
            transform: scale(1.02);
            background: linear-gradient(135deg, #c28244, #91623d);
        }

        .btn-game:active {
            transform: scale(0.98);
        }

        /* --- TAMPILAN SLIDE 2 (CARA MAIN & RULES) --- */
        .rules-screen {
            width: 100%;
            height: 100%;
            padding: 30px;
            background-color: #f7f2e1; 
            color: #3e2717;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .rules-title {
            font-size: clamp(22px, 4vw, 32px);
            color: #4a2e1b;
            margin-bottom: 15px;
            border-bottom: 3px dashed #7c5333;
            padding-bottom: 5px;
        }

        .rules-list {
            text-align: left;
            font-size: clamp(14px, 2.5vw, 18px);
            line-height: 1.5;
            max-width: 700px;
            margin-bottom: 25px;
            padding: 0 20px;
        }

        .rules-list li {
            margin-bottom: 12px;
        }

        /* Tombol lanjut di Slide 2 */
        .btn-lanjut {
            background: linear-gradient(135deg, #7c5333, #4a2e1b);
            color: #f0dca8;
            border: 2px solid #f0dca8;
            padding: 12px 35px;
            font-size: clamp(16px, 3vw, 22px);
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            -webkit-appearance: none;
        }
    </style>
</head>
<body>

    <audio id="soundKlik" src="slide 1 mulai.wav" preload="auto"></audio>

    <div class="game-frame">

        <div id="slide1" class="slide">
            <img src="slide 1.png" alt="PELITA Slide 1" class="bg-game-image">
            
            <div class="bottom-panel">
                <button class="btn-game" onclick="pindahKeSlide2()">MULAI PETUALANGAN</button>
            </div>
        </div>

        <div id="slide2" class="slide">
            <div class="rules-screen">
                <h2 class="rules-title">📜 CARA MAIN & ATURAN GAME</h2>
                <ul class="rules-list">
                    <li>Ikuti 12 Misi Kesehatan pelajar sehari-hari.</li>
                    <li>Pilih satu jawaban dari opsi yang tersedia di setiap cerita.</li>
                    <li>Dapatkan penjelasan ilmiah dan cek faktanya langsung.</li>
                    <li>Jawaban benar mendapat +1 bintang. Jawaban salah tidak mengurangi poin!</li>
                </ul>
                <button class="btn-lanjut" onclick="lanjutKeGame()">LANJUT KE CHAPTER 1</button>
            </div>
        </div>

    </div>

    <script>
        function pindahKeSlide2() {
            const audio = document.getElementById("soundKlik");
            audio.currentTime = 0; 
            audio.play().catch(function(error) {
                console.log("Audio dicegah oleh browser:", error);
            });

            // Beri jeda 300ms agar efek suara terdengar
            setTimeout(function() {
                document.getElementById("slide1").style.display = "none";
                document.getElementById("slide2").style.display = "block";
            }, 300);
        }

        function lanjutKeGame() {
            alert("Babak 1: Sakit Kepala di Sekolah. Segera Dimulai!");
        }
    </script>

</body>
</html>
